name: Homebrew Livecheck

on:
  schedule:
  - cron: 0 0 * * *
  workflow_dispatch:

jobs:
  livecheck:
    name: Livecheck on ${{ matrix.job.os }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      matrix:
        job:
          - os: macos-26       # arm64
          - os: macos-26-intel # intel

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v7

    - name: Bump Homebrew Casks
      uses: kitschpatrol/github-action-homebrew-bump-cask@v3.8.8
      with:
        token: ${{ secrets.HOMEBREW_TOKEN }}
        message: Bump version of homebrew cask
        tap: nepherte/ffmpeg
        livecheck: true
